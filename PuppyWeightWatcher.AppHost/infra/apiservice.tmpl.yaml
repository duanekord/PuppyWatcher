api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: connectionstrings--puppydb
        value: Server=sql,1433;User ID=sa;Password={{ securedParameter "sql_password" }};TrustServerCertificate=true;Encrypt=Optional;Initial Catalog=puppydb
      - name: puppydb-password
        value: '{{ securedParameter "sql_password" }}'
      - name: puppydb-uri
        value: mssql://sa:{{ securedParameter "sql_password" }}@sql:1433/puppydb
  template:
    containers:
      - image: {{ .Image }}
        name: apiservice
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: PUPPYDB_DATABASENAME
            value: puppydb
          - name: PUPPYDB_HOST
            value: sql
          - name: PUPPYDB_JDBCCONNECTIONSTRING
            value: jdbc:sqlserver://sql:1433;trustServerCertificate=true;databaseName=puppydb
          - name: PUPPYDB_PORT
            value: "1433"
          - name: PUPPYDB_USERNAME
            value: sa
          - name: ConnectionStrings__puppydb
            secretRef: connectionstrings--puppydb
          - name: PUPPYDB_PASSWORD
            secretRef: puppydb-password
          - name: PUPPYDB_URI
            secretRef: puppydb-uri
    scale:
      minReplicas: 1
tags:
  azd-service-name: apiservice
  aspire-resource-name: apiservice
